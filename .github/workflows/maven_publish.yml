name: "Call Publish package to the Maven Central Repository"

permissions:
  contents: read
  pull-requests: write

on:
  workflow_dispatch:

jobs:
  shared-workflows:
    uses: Sundsvallskommun/.github/.github/workflows/java-maven-publish.yml@d3a43f808d780e3a40b2ee698c83966d79b44e76 # main
    with:
      java: "25"
    secrets:
      MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
      MAVEN_GPG_PRIVATE_KEY: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
      MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
      MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
      USER_EMAIL: ${{ secrets.USER_EMAIL }}
      USER_NAME: ${{ secrets.USER_NAME }}
      UTVECKLINGSFABRIKEN_TOKEN: ${{ secrets.UTVECKLINGSFABRIKEN_TOKEN }}
